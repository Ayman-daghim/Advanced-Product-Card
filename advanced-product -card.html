<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <title>بطاقة منتج متقدمة</title>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css?family=Tajawal|Cairo"
        />
        <link
            rel="stylesheet"
            href="CSS-Advanced-Producd-Card/advanced-product-card.css"
        />
    </head>
    <body>
        <div class="container">
            <div class="product-card">
                <div class="product-image">🎧</div>
                <h2 class="product-title">
                    سماعات لاسلكية <span class="pro-badge">PRO X</span>
                </h2>
                <p class="product-description">
                    تجربة صوت استثنائية مع تقنية عزل الضوضاء، بطارية تدوم 30
                    ساعة، وتصميم مريح يناسب أذنيك.
                </p>
                <div class="rating">
                    ⭐⭐⭐⭐☆ <span class="rating-text">4.5 من 5</span>
                </div>
                <div class="price">89.99<span class="symbol">$</span></div>
                <button class="btn">أضف إلى السلة</button>
            </div>
        </div>
    </body>
</html>
